services:
  - type: web
    name: proctorx-ai-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput --clear
    preDeployCommand: python manage.py migrate --noinput
    startCommand: daphne -b 0.0.0.0 -p $PORT proctor_ai.asgi:application
    healthCheckPath: /admin/login/
    autoDeploy: true
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: proctorx-ai-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://proctorx-ai-web.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://proctorx-ai-web.vercel.app
      - key: FRONTEND_URL
        value: https://proctorx-ai-web.vercel.app
      - key: DB_CONN_MAX_AGE
        value: 600
      - key: DATABASE_URL
        fromDatabase:
          name: proctorx-ai-db
          property: connectionString
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_USE_TLS
        value: true
      - key: EMAIL_PORT
        value: 587
      - key: DJANGO_SITE_ID
        value: 1

databases:
  - name: proctorx-ai-db
    plan: starter